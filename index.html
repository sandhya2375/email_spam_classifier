<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Spam Classifier</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0a0a0f;
  --surface:#111118;
  --surface2:#1a1a24;
  --surface3:#22222f;
  --border:#ffffff0f;
  --border2:#ffffff18;
  --text:#f0f0f5;
  --text2:#8888a0;
  --text3:#555568;
  --accent:#6c63ff;
  --accent2:#8b85ff;
  --red:#ff4757;
  --red-bg:#ff475712;
  --green:#2ed573;
  --green-bg:#2ed57312;
  --amber:#ffa502;
  --amber-bg:#ffa50212;
  --font:'Space Grotesk',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

html{scroll-behavior:smooth}

body{
  font-family:var(--font);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:2rem 1rem 4rem;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, #6c63ff18, transparent),
    radial-gradient(ellipse 60% 40% at 80% 120%, #ff475708, transparent);
}

.app{max-width:680px;margin:0 auto}

/* ── Header ── */
.header{
  display:flex;align-items:center;gap:16px;
  margin-bottom:2.5rem;
  animation:fadeUp 0.5s ease both;
}
.logo{
  width:48px;height:48px;
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  box-shadow:0 0 24px #6c63ff40;
}
.logo svg{width:22px;height:22px;stroke:#fff}
.header h1{
  font-size:22px;font-weight:700;
  letter-spacing:-0.03em;
  background:linear-gradient(135deg,#f0f0f5,#8888a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.header p{font-size:13px;color:var(--text3);margin-top:3px}

/* ── Stats ── */
.stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  margin-bottom:1.25rem;
  animation:fadeUp 0.5s 0.1s ease both;
}
.stat{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;text-align:center;
  transition:border-color 0.2s,transform 0.2s;
}
.stat:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-n{
  font-size:28px;font-weight:600;
  font-family:var(--mono);
  color:var(--text);
  line-height:1;
}
.stat-l{font-size:11px;color:var(--text3);margin-top:5px;text-transform:uppercase;letter-spacing:0.08em}
.stat-n.red{color:var(--red)}
.stat-n.green{color:var(--green)}

/* ── Card ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.5rem;
  margin-bottom:1.25rem;
  animation:fadeUp 0.5s 0.15s ease both;
  transition:border-color 0.2s;
}
.card:hover{border-color:var(--border2)}
.card-title{
  font-size:11px;font-weight:600;
  color:var(--text3);
  text-transform:uppercase;letter-spacing:0.1em;
  margin-bottom:1.25rem;
}

/* ── Fields ── */
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.field-label{font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}

input[type=text],textarea{
  width:100%;
  padding:11px 14px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  transition:border-color 0.2s,box-shadow 0.2s;
  outline:none;
}
input[type=text]:focus,textarea:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px #6c63ff20;
}
input[type=text]::placeholder,textarea::placeholder{color:var(--text3)}

textarea{
  min-height:130px;
  resize:vertical;
  font-family:var(--mono);
  font-size:12.5px;
  line-height:1.7;
}

/* ── Button ── */
.btn{
  width:100%;margin-top:14px;
  padding:13px;
  background:linear-gradient(135deg,#6c63ff,#a78bfa);
  border:none;border-radius:12px;
  color:#fff;
  font-family:var(--font);font-size:14px;font-weight:600;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:opacity 0.2s,transform 0.15s,box-shadow 0.2s;
  box-shadow:0 4px 20px #6c63ff30;
  letter-spacing:0.01em;
}
.btn:hover{opacity:0.9;transform:translateY(-1px);box-shadow:0 6px 28px #6c63ff45}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.35;cursor:not-allowed;transform:none}

/* ── Result ── */
.result{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:1.5rem;
  margin-bottom:1.25rem;
  display:none;
  animation:fadeUp 0.4s ease both;
}

.result-top{
  display:flex;align-items:flex-start;
  gap:12px;
  margin-bottom:1.25rem;
  padding-bottom:1.25rem;
  border-bottom:1px solid var(--border);
}
.verdict-wrap{flex:1}
.verdict-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px}
.badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;font-weight:600;
  letter-spacing:0.02em;
}
.badge-spam{background:var(--red-bg);color:var(--red);border:1px solid #ff475730}
.badge-legit{background:var(--green-bg);color:var(--green);border:1px solid #2ed57330}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block}

.risk-wrap{text-align:right}
.risk-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px}
.risk-num{font-size:30px;font-weight:600;font-family:var(--mono);line-height:1}

/* ── Bars ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-lbl{font-size:12px;color:var(--text2);min-width:120px}
.bar-track{flex:1;height:5px;background:var(--surface3);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 0.7s cubic-bezier(.34,1.56,.64,1)}
.bar-fill.spam{background:linear-gradient(90deg,#ff4757,#ff6b81)}
.bar-fill.legit{background:linear-gradient(90deg,#2ed573,#7bed9f)}
.bar-pct{font-size:12px;font-family:var(--mono);font-weight:500;color:var(--text);min-width:36px;text-align:right}

/* ── Signals ── */
.signals{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:1.25rem}
.signal{
  display:flex;align-items:flex-start;gap:8px;
  padding:10px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.dot.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.dot.amber{background:var(--amber);box-shadow:0 0 6px var(--amber)}
.dot.green{background:var(--green);box-shadow:0 0 6px var(--green)}
.signal-txt{font-size:12px;color:var(--text2);line-height:1.5}

/* ── Explanation ── */
.explain{
  margin-top:1.25rem;
  padding:12px 14px;
  background:var(--surface2);
  border-radius:10px;
  border-left:2px solid var(--accent);
  font-size:13px;color:var(--text2);line-height:1.7;
}

/* ── History ── */
.history-list{display:flex;flex-direction:column;gap:6px}
.hist-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  transition:background 0.15s,border-color 0.15s;
}
.hist-item:hover{background:var(--surface3);border-color:var(--border2)}
.hist-badge{
  font-size:10px;font-weight:600;
  padding:3px 10px;border-radius:99px;
  flex-shrink:0;letter-spacing:0.04em;
}
.hist-subject{font-size:13px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-time{font-size:11px;color:var(--text3);font-family:var(--mono);flex-shrink:0}
.empty{text-align:center;padding:2rem;color:var(--text3);font-size:13px}

/* ── Spinner ── */
.spinner{
  width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.2);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Error ── */
.error{
  margin-top:10px;padding:10px 14px;
  background:var(--red-bg);
  border:1px solid #ff475730;
  border-radius:10px;
  font-size:13px;color:var(--red);
}

/* ── Responsive ── */
@media(max-width:520px){
  .row{grid-template-columns:1fr}
  .signals{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr 1fr}
  .header h1{font-size:18px}
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
    </div>
    <div>
      <h1>Email Spam Classifier</h1>
      <p>Powered by Claude AI — real-time detection</p>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-n" id="total">0</div><div class="stat-l">Analyzed</div></div>
    <div class="stat"><div class="stat-n red" id="spam-c">0</div><div class="stat-l">Spam</div></div>
    <div class="stat"><div class="stat-n green" id="legit-c">0</div><div class="stat-l">Legit</div></div>
  </div>

  <div class="card">
    <div class="card-title">Email Details</div>
    <div class="row">
      <div>
        <div class="field-label">Subject line</div>
        <input type="text" id="subject" placeholder="e.g. You've won $1,000,000!"/>
      </div>
      <div>
        <div class="field-label">Sender</div>
        <input type="text" id="sender" placeholder="e.g. noreply@prize.xyz"/>
      </div>
    </div>
    <div class="field-label">Email body</div>
    <textarea id="body" placeholder="Email ka poora content yahan paste karein..."></textarea>
    <button class="btn" id="btn" onclick="analyze()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      Analyze Email
    </button>
  </div>

  <div class="result" id="result">
    <div class="result-top">
      <div class="verdict-wrap">
        <div class="verdict-lbl">Verdict</div>
        <span class="badge" id="badge">—</span>
      </div>
      <div class="risk-wrap">
        <div class="risk-lbl">Risk Score</div>
        <div class="risk-num" id="risk">—</div>
      </div>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">Spam probability</span>
      <div class="bar-track"><div class="bar-fill spam" id="sbar" style="width:0%"></div></div>
      <span class="bar-pct" id="spct">0%</span>
    </div>
    <div class="bar-row">
      <span class="bar-lbl">Legit probability</span>
      <div class="bar-track"><div class="bar-fill legit" id="lbar" style="width:0%"></div></div>
      <span class="bar-pct" id="lpct">0%</span>
    </div>
    <div class="signals" id="signals"></div>
    <div class="explain" id="explain"></div>
  </div>

  <div class="card">
    <div class="card-title">Recent History</div>
    <div class="history-list" id="hist">
      <div class="empty">Abhi tak koi email analyze nahi hua</div>
    </div>
  </div>

</div>

<script>
const USE_BACKEND = true;
const BACKEND_URL = "https://email-spam-classifier-5ni7.onrender.com/api/classify";
const API_KEY = ""; // backend use ho raha hai, key ki zaroorat nahi
const MODEL = "claude-sonnet-4-20250514";

let history = [], stats = {t:0,s:0,l:0};

async function analyze(){
  const subject = document.getElementById("subject").value.trim();
  const sender  = document.getElementById("sender").value.trim();
  const body    = document.getElementById("body").value.trim();
  if(!body && !subject){ document.getElementById("body").focus(); return; }

  const btn = document.getElementById("btn");
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Analyzing...';
  document.getElementById("result").style.display = "none";

  try{
    let r;
    if(USE_BACKEND){
      const res = await fetch(BACKEND_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({subject,sender,body})});
      if(!res.ok) throw new Error("Server error "+res.status);
      r = await res.json();
    } else {
      const prompt = `You are a precise email spam classifier. Analyze this email and respond ONLY with valid JSON (no markdown, no backticks).

Email:
Subject: ${subject||"(none)"}
From: ${sender||"(unknown)"}
Body: ${body||"(empty)"}

Respond with this exact JSON:
{"verdict":"SPAM or LEGITIMATE","spam_probability":0-100,"legit_probability":0-100,"risk_score":0.0-10.0,"signals":[{"type":"red|amber|green","text":"short signal max 8 words"},{"type":"red|amber|green","text":"..."},{"type":"red|amber|green","text":"..."},{"type":"red|amber|green","text":"..."}],"explanation":"2-3 sentences plain English"}`;

      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:MODEL,max_tokens:1000,messages:[{role:"user",content:prompt}]})
      });
      if(!res.ok) throw new Error("API error "+res.status);
      const d = await res.json();
      const txt = d.content.map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
      r = JSON.parse(txt);
    }
    showResult(r, subject||body.substring(0,40)+"...");
    addHistory(r, subject||body.substring(0,35)+"...");
    updateStats(r.verdict);
  } catch(e){
    console.error(e);
    let el = document.getElementById("err");
    if(!el){el=document.createElement("div");el.id="err";el.className="error";btn.after(el);}
    el.textContent = "Error: " + (e.message||"Kuch galat hua, dobara try karein.");
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Analyze Email`;
}

function showResult(r, label){
  const el = document.getElementById("result");
  el.style.display = "block";

  const isSpam = r.verdict === "SPAM";
  const badge = document.getElementById("badge");
  badge.textContent = isSpam ? "Spam Detected" : "Legitimate Email";
  badge.className = "badge " + (isSpam ? "badge-spam" : "badge-legit");

  const riskEl = document.getElementById("risk");
  riskEl.textContent = r.risk_score + "/10";
  riskEl.style.color = r.risk_score>=7?"var(--red)":r.risk_score>=4?"var(--amber)":"var(--green)";

  const sp = Math.round(r.spam_probability), lp = Math.round(r.legit_probability);
  document.getElementById("sbar").style.width = sp+"%";
  document.getElementById("lbar").style.width = lp+"%";
  document.getElementById("spct").textContent = sp+"%";
  document.getElementById("lpct").textContent = lp+"%";

  const sg = document.getElementById("signals");
  sg.innerHTML = (r.signals||[]).map(s=>`
    <div class="signal">
      <div class="dot ${s.type}"></div>
      <span class="signal-txt">${esc(s.text)}</span>
    </div>`).join("");

  document.getElementById("explain").textContent = r.explanation||"";
  el.scrollIntoView({behavior:"smooth",block:"nearest"});
}

function addHistory(r, label){
  const now = new Date();
  const time = now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
  history.unshift({label, isSpam:r.verdict==="SPAM", time, risk:r.risk_score});
  if(history.length>8) history.pop();
  renderHistory();
}

function renderHistory(){
  const el = document.getElementById("hist");
  if(!history.length){ el.innerHTML='<div class="empty">Abhi tak koi email analyze nahi hua</div>'; return; }
  el.innerHTML = history.map(h=>`
    <div class="hist-item">
      <span class="hist-badge ${h.isSpam?"badge-spam":"badge-legit"}">${h.isSpam?"SPAM":"LEGIT"}</span>
      <span class="hist-subject">${esc(h.label)}</span>
      <span class="hist-time">${h.time} · ${h.risk}/10</span>
    </div>`).join("");
}

function updateStats(verdict){
  stats.t++; if(verdict==="SPAM") stats.s++; else stats.l++;
  document.getElementById("total").textContent = stats.t;
  document.getElementById("spam-c").textContent = stats.s;
  document.getElementById("legit-c").textContent = stats.l;
}

function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

document.addEventListener("keydown", e=>{ if(e.ctrlKey && e.key==="Enter") analyze(); });
</script>
</body>
</html>
