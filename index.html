<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Email Spam Classifier</title>
  <link rel="stylesheet" href="src/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">

    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#378ADD" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      </div>
      <div class="header-text">
        <h1>Email Spam Classifier</h1>
        <p>Claude AI se powered — real-time spam detection</p>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-lbl">Analyzed</div>
      </div>
      <div class="stat-box">
        <div class="stat-num spam-color" id="spam-count">0</div>
        <div class="stat-lbl">Spam</div>
      </div>
      <div class="stat-box">
        <div class="stat-num legit-color" id="legit-count">0</div>
        <div class="stat-lbl">Legitimate</div>
      </div>
    </div>

    <div class="card">
      <span class="label">Email Details</span>
      <div class="input-row">
        <div>
          <div class="field-label">Subject line</div>
          <input type="text" id="subject" placeholder="e.g. You've won $1,000,000!" />
        </div>
        <div>
          <div class="field-label">Sender</div>
          <input type="text" id="sender" placeholder="e.g. noreply@prize.xyz" />
        </div>
      </div>
      <div class="field-label">Email body</div>
      <textarea id="body" placeholder="Email ka poora content yahan paste karein..."></textarea>
      <button class="btn-analyze" id="analyze-btn" onclick="analyzeEmail()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Analyze Email
      </button>
    </div>

    <div class="result-card" id="result-card">
      <div class="result-header">
        <div>
          <div class="section-label">Verdict</div>
          <span class="verdict-badge" id="verdict-badge">—</span>
        </div>
        <div style="flex:1"></div>
        <div style="text-align:right">
          <div class="section-label">Risk Score</div>
          <div class="risk-score" id="risk-score">—</div>
        </div>
      </div>

      <div class="confidence-row">
        <span class="confidence-label">Spam probability</span>
        <div class="bar-track"><div class="bar-fill bar-spam" id="spam-bar" style="width:0%"></div></div>
        <span class="conf-pct" id="spam-pct">0%</span>
      </div>
      <div class="confidence-row">
        <span class="confidence-label">Legit probability</span>
        <div class="bar-track"><div class="bar-fill bar-legit" id="legit-bar" style="width:0%"></div></div>
        <span class="conf-pct" id="legit-pct">0%</span>
      </div>

      <div class="section-label" style="margin-top:1rem; margin-bottom:8px">Detection Signals</div>
      <div class="signals-grid" id="signals-grid"></div>

      <div class="section-label" style="margin-top:1rem; margin-bottom:8px">Analysis</div>
      <div class="explanation" id="explanation"></div>
    </div>

    <div class="card">
      <span class="label">Recent History</span>
      <div class="history-list" id="history-list">
        <div class="empty-state">Abhi tak koi email analyze nahi hua</div>
      </div>
    </div>

  </div>

  <script src="src/app.js"></script>
</body>
</html>
